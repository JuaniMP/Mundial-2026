version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: mundial_db
    restart: always
    environment:
      MYSQL_DATABASE: mundial_2026_hub
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: mundial_user
      MYSQL_PASSWORD: mundial_password
    ports:
      - '3307:3306'
    volumes:
      - db_data:/var/lib/mysql
      - ./basededatos/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  db_data:
