name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: frontend · lint · typecheck · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: 'frontend/world-cup-2026/package-lock.json'

      - name: Install dependencies
        working-directory: frontend/world-cup-2026
        run: npm ci

      - name: Lint
        working-directory: frontend/world-cup-2026
        run: npm run lint

      - name: Typecheck
        working-directory: frontend/world-cup-2026
        run: npm run typecheck

      - name: Build
        working-directory: frontend/world-cup-2026
        run: npm run build

  format:
    name: prettier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: 'frontend/world-cup-2026/package-lock.json'
      - name: Install dependencies
        working-directory: frontend/world-cup-2026
        run: npm ci
      - name: Check formatting
        run: npx prettier --check "frontend/world-cup-2026/src/**/*.{ts,tsx,js,jsx,json,md,css,html}"
