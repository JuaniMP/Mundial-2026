spring.application.name=mundial-2026-hub
server.port=8082
server.servlet.context-path=/

# ============== Datasource (VM Remota via Tailscale) ==============
# ⚠️  NUNCA poner credenciales reales aquí — usar variables de entorno.
# Copia .env.example → .env.local y usa start-dev.bat para arrancar.
spring.datasource.url=jdbc:mysql://100.87.26.105:3306/MundialHUB2026?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=${DB_USER:juanita_mh}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# ============== JPA / Hibernate ==============
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.sql.init.mode=never

# ============== JWT ==============
# Generar con: openssl rand -base64 64
# ⚠️  Sin default — DEBE venir de la variable de entorno JWT_SECRET
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION_MS:3600000}

# ============== CORS ==============
# Desarrollo: localhost:5173+  |  Producción: set CORS_ORIGINS=https://tu-dominio.com
mundial26.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176,http://localhost:5177,http://localhost:4173}

# ============== Actuator ==============
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ============== Logging ==============
logging.level.root=INFO
logging.level.co.edu.unbosque=DEBUG
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%-5level] [%X{correlationId:-}] %logger{36} - %msg%n

# ============== Email (Gmail SMTP) ==============
# ⚠️  Contraseña DEBE venir de env var MAIL_PASSWORD (app password de Gmail)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:mundialparatodos2026@gmail.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ============== Football Data API ==============
# ⚠️  API key DEBE venir de env var FOOTBALL_DATA_KEY
footballdata.api.key=${FOOTBALL_DATA_KEY:}
footballdata.api.base-url=https://api.football-data.org/v4
footballdata.competition=WC
footballdata.season=2026

# Cache (Caffeine) - 5 min TTL
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=100,expireAfterWrite=300s

# ============== Stripe (Sandbox) ==============
# ⚠️  Claves DEBEN venir de env vars — nunca hardcodear en este archivo
stripe.secret.key=${STRIPE_SECRET_KEY:sk_test_PLACEHOLDER}
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY:pk_test_PLACEHOLDER}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_PLACEHOLDER}

# ============== Firebase FCM ==============
firebase.enabled=${FIREBASE_ENABLED:false}
firebase.service-account-json=${FIREBASE_SERVICE_ACCOUNT_JSON:}
firebase.service-account-file=${FIREBASE_SERVICE_ACCOUNT_FILE:}

# ============== Rate Limiting ==============
# Límites por defecto (req/minuto). Sobreescribir con env vars en producción.
rate.limit.requests-per-minute=${RATE_LIMIT_RPM:60}
rate.limit.burst-capacity=${RATE_LIMIT_BURST:20}

# ============== Springdoc / Swagger ==============
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
