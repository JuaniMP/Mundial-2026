spring.application.name=mundial-2026-hub
server.port=8082
server.servlet.context-path=/

# ============== Datasource (MySQL Docker) ==============
spring.datasource.url=jdbc:mysql://localhost:3307/mundial_2026_hub?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=${DB_USER:mundial}
spring.datasource.password=${DB_PASSWORD:mundial2026}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# ============== JPA / Hibernate ==============
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.sql.init.mode=never

# ============== Schema ==============
# Using Hibernate DDL (create/update) instead of schema.sql

# ============== JWT (secret BASE64-encoded, mínimo 256 bits) ==============
# Para generar uno propio: openssl rand -base64 64
jwt.secret=${JWT_SECRET:bXVuZGlhbC0yMDI2LWh1Yi1zZWNyZXQta2V5LXBhcmEtZmlybWFyLXRva2Vucy1qd3QtZGUtZm9ybWEtc2VndXJhLXkta2V5LWxhcmdhLW1pbi0zMi1ieXRlcw==}
jwt.expiration=${JWT_EXPIRATION_MS:3600000}

# ============== CORS (frontend Vite en 5173) ==============
mundial26.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:4173,http://localhost:5177}

# ============== Actuator ==============
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ============== Logging (con correlation ID) ==============
logging.level.root=INFO
logging.level.co.edu.unbosque=DEBUG
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%-5level] [%X{correlationId:-}] %logger{36} - %msg%n

# ============== Springdoc / Swagger ==============
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
