version: "3.9"

# Levanta MySQL 8 + Adminer (UI web para inspeccionar la DB).
# Uso:
#   cd backend
#   docker compose up -d
#   ./mvnw spring-boot:run
#
# La primera vez se ejecuta schema.sql (montado como init script).
# Adminer → http://localhost:8081
#   Sistema: MySQL · Servidor: db · Usuario: mundial · Pass: mundial2026 · DB: mundial_2026_hub

services:
  db:
    image: mysql:8.4
    container_name: mundial26-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: mundial_2026_hub
      MYSQL_USER: mundial
      MYSQL_PASSWORD: mundial2026
      MYSQL_ROOT_PASSWORD: rootpassword
      TZ: America/Bogota
    ports:
      - "3307:3306"
    volumes:
      - mundial26_mysql_data:/var/lib/mysql
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=-05:00
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "mundial", "-pmundial2026"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:4.8.1
    container_name: mundial26-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  mundial26_mysql_data:
    name: mundial26_mysql_data
